version: "3"

services:

  nginx:
    image: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - node
      - python

  node:
    build: ./node-service
    ports:
      - "3000:3000"

  python:
    build: ./python-service
    ports:
      - "5000:5000"

  mongo:
    image: mongo
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:

